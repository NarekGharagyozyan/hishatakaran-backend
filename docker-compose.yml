version: "3.8"

services:
  mysql:
    image: mysql:8.4
    container_name: hishatakaran-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hishatakaran
      MYSQL_USER: hishatakaranlogin
      MYSQL_PASSWORD: hishatakaranpassword
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data: