spring:
  application:
    name: backend
  jackson:
    serialization:
      indent_output: true
  datasource:
    url: jdbc:mysql://localhost:3307/hishatakaran
    username: hishatakaranlogin
    password: hishatakaranpassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: NEVER
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

server:
  port: 8888

app:
  api:
    swagger:
      enable: true

gemini:
  api:
    key: ${GEMINI_API_KEY}